<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Муринский переводчик</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f8f9fa;
margin:0;
padding:30px;
transition:.3s;
}

.dark{
background:#202124;
color:white;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
}

.panel{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.box{
background:white;
border-radius:10px;
border:1px solid #dadce0;
padding:10px;
}

.dark .box{
background:#303134;
border-color:#5f6368;
}

textarea{
width:100%;
height:170px;
border:none;
resize:none;
font-size:16px;
outline:none;
background:transparent;
color:inherit;
}

button{
border:none;
background:#e8eaed;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin:3px;
}

.dark button{
background:#3c4043;
color:white;
}

.topButtons{
display:flex;
justify-content:space-between;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modalBox{
background:white;
padding:20px;
border-radius:10px;
width:380px;
max-height:400px;
overflow:auto;
position:relative;
}

.dark .modalBox{
background:#303134;
}

.close{
position:absolute;
top:10px;
right:12px;
cursor:pointer;
}

.lang{
padding:6px;
cursor:pointer;
}

.lang:hover{
background:#eee;
}

.dark .lang:hover{
background:#444;
}

.counter{
position:fixed;
bottom:5px;
right:10px;
font-size:11px;
opacity:.5;
}

</style>
</head>

<body>

<div class="container">

<h1 id="title">Муринский переводчик</h1>

<div class="topButtons">

<div>
<button id="dictBtn" onclick="openDict()">📚 Словарь</button>
<button id="setBtn" onclick="openSettings()">⚙️ Настройки</button>
<button onclick="toggleDark()">🌙</button>
</div>

<button onclick="clearText()" id="clearBtn">Очистить</button>

</div>

<div class="panel">

<div class="box">

<div id="rLabel">Русский</div>

<textarea id="input"></textarea>

<div>

<button onclick="copyInput()">Копировать</button>
<button onclick="startVoice()">🎤</button>
<button onclick="openPhoto()">📷</button>
<button onclick="speak(input.value)">🔊</button>

</div>

</div>

<div class="box">

<div id="mLabel">Муринский</div>

<textarea id="output" readonly></textarea>

<div>

<button onclick="copyOutput()">Копировать</button>
<button onclick="speak(output.value)">🔊</button>

</div>

</div>

</div>

<input type="file" id="photo" hidden>

</div>

<div class="counter" id="counter"></div>

<!-- словарь -->

<div class="modal" id="dictionary">
<div class="modalBox">

<div class="close" onclick="closeDict()">✕</div>

<h3>Словарь</h3>

<div id="dictList"></div>

</div>
</div>

<!-- настройки -->

<div class="modal" id="settings">
<div class="modalBox">

<div class="close" onclick="closeSettings()">✕</div>

<h3>Язык сайта</h3>

<input id="langSearch" placeholder="поиск языка">

<div id="langs"></div>

<button onclick="resetLang()">Сбросить язык</button>

</div>
</div>

<script>

// исключения
const exceptions={
"я":"ч",
"друг":"друн",
"дед":"дод",
"батя":"батч",
"жена":"жинка",
"сын":"сыр",
"кто":"кьо",
"что":"чьо"
}

// перевод
const input=document.getElementById("input")
const output=document.getElementById("output")

function translate(text){

let words=text.split(/(\s+)/)

return words.map(w=>{

let lw=w.toLowerCase()

if(exceptions[lw]) return exceptions[lw]

if(lw.length<=1) return w

return w+"ость"

}).join("")

}

input.addEventListener("input",()=>{

let v=input.value

if(/[^а-яА-ЯёЁ0-9\s.,!?]/.test(v)){
input.value=v.replace(/[^а-яА-ЯёЁ0-9\s.,!?]/g,"")
}

output.value=translate(input.value)

})

// копирование
function copyInput(){
navigator.clipboard.writeText(input.value)
}

function copyOutput(){
navigator.clipboard.writeText(output.value)
}

function clearText(){
input.value=""
output.value=""
}

// тёмная тема
function toggleDark(){
document.body.classList.toggle("dark")
}

// голос воспроизведение
function speak(text){

let msg=new SpeechSynthesisUtterance(text)
msg.lang="ru-RU"
speechSynthesis.speak(msg)

}

// 🎤 голосовой ввод
function startVoice(){

const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition

const recognition = new SpeechRecognition()

recognition.lang="ru-RU"
recognition.start()

recognition.onresult=(event)=>{

let text=event.results[0][0].transcript

input.value+= " "+text
output.value=translate(input.value)

}

}

// фото
function openPhoto(){
document.getElementById("photo").click()
}

document.getElementById("photo").addEventListener("change",async(e)=>{

let file=e.target.files[0]

let result=await Tesseract.recognize(file,"rus")

input.value=result.data.text
output.value=translate(input.value)

})

// словарь
function openDict(){

let box=document.getElementById("dictList")
box.innerHTML=""

for(let k in exceptions){

box.innerHTML+=k+" → "+exceptions[k]+"<br>"

}

document.getElementById("dictionary").style.display="flex"

}

function closeDict(){
document.getElementById("dictionary").style.display="none"
}

// настройки
function openSettings(){
document.getElementById("settings").style.display="flex"
}

function closeSettings(){
document.getElementById("settings").style.display="none"
}

// языки

const translations={

Русский:{
title:"Муринский переводчик",
r:"Русский",
m:"Муринский"
},

English:{
title:"Murinsky Translator",
r:"Russian",
m:"Murinsky"
},

Deutsch:{
title:"Murinsky Übersetzer",
r:"Russisch",
m:"Murinsky"
}

}

// список языков
const langs=[
"Русский","English","Deutsch","Français","Español",
"Italiano","Polski","Čeština","日本語","中文"
]

const langBox=document.getElementById("langs")

langs.forEach(l=>{

let d=document.createElement("div")
d.className="lang"
d.innerText=l

d.onclick=()=>changeLang(l)

langBox.appendChild(d)

})

function changeLang(lang){

let t=translations[lang] || translations["English"]

document.getElementById("title").innerText=t.title
document.getElementById("rLabel").innerText=t.r
document.getElementById("mLabel").innerText=t.m

}

function resetLang(){
changeLang("Русский")
}

// онлайн счетчик

function updateCounter(){

let num=Math.floor(Math.random()*200)+40

document.getElementById("counter").innerText="online: "+num

}

setInterval(updateCounter,3000)
updateCounter()

</script>

</body>
</html>
