<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Translator</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f5f5f5;
    color: #333;
    transition: background-color 0.3s, color 0.3s;
}
.dark-theme {
    background-color: #333;
    color: #f5f5f5;
}
.container {
    max-width: 800px;
    margin: auto;
}
textarea {
    width: 100%;
    height: 100px;
    padding: 10px;
    font-size: 16px;
    margin-top: 5px;
    box-sizing: border-box;
}
input, select {
    padding: 5px;
    font-size: 16px;
}
.button {
    display: inline-block;
    margin: 5px 0;
    padding: 8px 12px;
    background: #0084ff;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
    border-radius: 4px;
}
.button:hover {
    background: #005bb5;
}
#input-controls {
    margin-bottom: 10px;
}
.icon-button {
    font-size: 20px;
    cursor: pointer;
    margin-left: 5px;
    vertical-align: middle;
}
#counter {
    margin-top: 5px;
    font-size: 14px;
    color: #555;
}
.dark-theme #counter {
    color: #ccc;
}
#outputText {
    margin-top: 10px;
}
#languageSelect {
    margin-top: 10px;
}
#loader {
    display: none;
    margin-top: 10px;
}
.modal {
    display: none;
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    background: inherit;
    border: 2px solid #888;
    padding: 20px;
    z-index: 10;
    max-width: 80%;
    max-height: 60%;
    overflow: auto;
}
.modal-close {
    float: right;
    cursor: pointer;
    font-weight: bold;
}
.modal-content {
    margin-top: 10px;
}
#overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.3);
    z-index: 5;
}
</style>
</head>
<body>
<div class="container">
    <h1>Translator / Переводчик</h1>
    <div>
        <button id="themeToggle" class="button">Тёмная тема</button>
    </div>
    <div id="input-area">
        <label for="inputText">Введите текст:</label>
        <div id="input-controls">
            <textarea id="inputText" placeholder="Введите текст здесь"></textarea>
            <span class="icon-button" id="clearBtn" title="Очистить ввод">✖️</span>
            <span class="icon-button" id="micBtn" title="Голосовой ввод">🎤</span>
            <input type="file" id="imageInput" accept="image/*" title="Фото с текстом">
        </div>
        <div id="counter">Символов: 0, Слов: 0</div>
    </div>
    <div>
        <label for="languageSelect">Язык перевода:</label>
        <select id="languageSelect">
            <option value="auto">Авто-определение</option>
            <option value="ru">Русский</option>
            <option value="en">Английский</option>
            <option value="es">Испанский</option>
            <option value="fr">Французский</option>
            <option value="de">Немецкий</option>
            <option value="zh">Китайский</option>
            <option value="ja">Японский</option>
            <option value="ko">Корейский</option>
            <option value="ar">Арабский</option>
            <option value="pt">Португальский</option>
            <!-- при необходимости добавить другие языки -->
            <option value="mur">Муринский</option>
        </select>
    </div>
    <div>
        <button id="translateBtn" class="button">Перевести</button>
    </div>
    <div>
        <label for="outputText">Результат:</label>
        <textarea id="outputText" readonly></textarea>
        <span class="icon-button" id="playBtn" title="Произнести вслух">🔊</span>
    </div>
    <div>
        <button id="dictBtn" class="button">Словарь</button>
        <button id="settingsBtn" class="button">Настройки</button>
    </div>
</div>

<div id="overlay"></div>
<div id="dictionaryPanel" class="modal">
    <span class="modal-close" id="closeDict">[Закрыть]</span>
    <h2>Словарь</h2>
    <div class="modal-content" id="dictionaryContent">
        <!-- Содержимое словаря (пример) -->
        <p>Пример словаря:</p>
        <ul>
            <li>Привет → Чего (пример)</li>
            <li>Мир → ...</li>
        </ul>
    </div>
</div>
<div id="settingsPanel" class="modal">
    <span class="modal-close" id="closeSettings">[Закрыть]</span>
    <h2>Настройки</h2>
    <div class="modal-content">
        <!-- Содержимое настроек -->
        <p>Настройки переводчика...</p>
    </div>
</div>

<div id="loader">⌛ Распознавание текста...</div>

<script src="https://unpkg.com/tesseract.js@v2.1.4/dist/tesseract.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const inputText = document.getElementById('inputText');
    const outputText = document.getElementById('outputText');
    const translateBtn = document.getElementById('translateBtn');
    const languageSelect = document.getElementById('languageSelect');
    const playBtn = document.getElementById('playBtn');
    const clearBtn = document.getElementById('clearBtn');
    const micBtn = document.getElementById('micBtn');
    const imageInput = document.getElementById('imageInput');
    const loader = document.getElementById('loader');
    const themeToggle = document.getElementById('themeToggle');
    const dictBtn = document.getElementById('dictBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const dictionaryPanel = document.getElementById('dictionaryPanel');
    const settingsPanel = document.getElementById('settingsPanel');
    const closeDict = document.getElementById('closeDict');
    const closeSettings = document.getElementById('closeSettings');
    const overlay = document.getElementById('overlay');
    const counter = document.getElementById('counter');

    // Обновление счётчика символов и слов
    function updateCounter() {
        const text = inputText.value;
        const chars = text.length;
        const words = text.trim().length > 0 ? text.trim().split(/\\s+/).length : 0;
        counter.textContent = 'Символов: ' + chars + ', Слов: ' + words;
    }
    inputText.addEventListener('input', updateCounter);

    // Кнопка очистки ввода
    clearBtn.addEventListener('click', () => {
        inputText.value = '';
        outputText.value = '';
        updateCounter();
    });

    // Переключение темы
    themeToggle.addEventListener('click', function() {
        document.body.classList.toggle('dark-theme');
        themeToggle.textContent = document.body.classList.contains('dark-theme') ? 'Светлая тема' : 'Тёмная тема';
    });

    // Открытие и закрытие модальных окон (словарь, настройки)
    function openModal(modal) {
        modal.style.display = 'block';
        overlay.style.display = 'block';
    }
    function closeModal(modal) {
        modal.style.display = 'none';
        overlay.style.display = 'none';
    }
    dictBtn.addEventListener('click', () => openModal(dictionaryPanel));
    settingsBtn.addEventListener('click', () => openModal(settingsPanel));
    closeDict.addEventListener('click', () => closeModal(dictionaryPanel));
    closeSettings.addEventListener('click', () => closeModal(settingsPanel));
    overlay.addEventListener('click', () => {
        closeModal(dictionaryPanel);
        closeModal(settingsPanel);
    });

    // Голосовой ввод
    micBtn.addEventListener('click', () => {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            alert('Ваш браузер не поддерживает распознавание речи');
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.onresult = function(event) {
            inputText.value = event.results[0][0].transcript;
            updateCounter();
        };
        recognition.start();
    });

    // Произношение результата
    playBtn.addEventListener('click', () => {
        const text = outputText.value;
        if (!text) return;
        const msg = new SpeechSynthesisUtterance(text);
        const lang = languageSelect.value === 'auto' ? 'ru' : languageSelect.value;
        const voices = speechSynthesis.getVoices();
        for (let voice of voices) {
            if (voice.lang.startsWith(lang)) {
                msg.voice = voice;
                break;
            }
        }
        msg.lang = lang;
        speechSynthesis.speak(msg);
    });

    // Распознавание текста с изображения (OCR)
    imageInput.addEventListener('change', () => {
        const file = imageInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function() {
            loader.style.display = 'block';
            Tesseract.recognize(reader.result, 'rus')
                .then(({ data: { text } }) => {
                    inputText.value = text;
                    updateCounter();
                })
                .catch(err => {
                    console.error(err);
                    alert('Ошибка распознавания текста');
                })
                .finally(() => {
                    loader.style.display = 'none';
                });
        };
        reader.readAsDataURL(file);
    });

    // Функция перевода
    async function translateText() {
        let text = inputText.value.trim();
        if (!text) return;
        const targetLang = languageSelect.value;
        // Муринский язык - особая обработка
        if (targetLang === 'mur') {
            // Пример: добавляем "ость" к каждому слову (пример исключений)
            const exceptions = { 'мур': 'мур' }; // можно добавить исключения
            const words = text.split(/(\s+)/);
            const transformed = words.map(word => {
                const clean = word.replace(/[^а-яА-ЯёЁ]/g, '');
                if (exceptions[clean]) return exceptions[clean];
                if (clean.length > 0) {
                    return clean + 'ость';
                }
                return word;
            });
            outputText.value = transformed.join('');
            return;
        }
        // Проверка выбора языка
        if (targetLang === 'auto') { 
            alert('Пожалуйста, выберите целевой язык для перевода.');
            return;
        }
        // Используем API LibreTranslate (Argos instance)
        const data = {
            q: text,
            source: 'auto',
            target: targetLang
        };
        try {
            const res = await fetch('https://translate.argosopentech.com/translate', {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            });
            const result = await res.json();
            outputText.value = result.translatedText;
        } catch (err) {
            console.error(err);
            alert('Ошибка перевода');
        }
    }

    translateBtn.addEventListener('click', translateText);
});
</script>
</body>
</html>
