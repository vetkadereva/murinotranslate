<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Муринский переводчик</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f8f9fa;
margin:0;
padding:30px;
transition:0.3s;
}

.dark{
background:#202124;
color:white;
}

.container{max-width:1000px;margin:auto;}

h1{text-align:center;margin-bottom:20px;}

.topBar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.panel{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.box{
background:white;
border-radius:12px;
border:1px solid #dadce0;
padding:14px;
}

.dark .box{
background:#303134;
border-color:#5f6368;
}

textarea{
width:100%;
height:170px;
border:none;
resize:none;
font-size:16px;
outline:none;
background:transparent;
color:inherit;
}

button{
border:none;
background:#e8eaed;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin:4px;
}

.dark button{
background:#3c4043;
color:white;
}

.modal{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modalBox{
background:white;
padding:20px;
border-radius:12px;
width:400px;
max-height:420px;
overflow:auto;
position:relative;
}

.dark .modalBox{background:#303134;}

.close{
position:absolute;
top:10px;
right:12px;
cursor:pointer;
font-size:18px;
}

.loader{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
z-index:1000;
}

.counter{
position:fixed;
bottom:8px;
right:10px;
font-size:11px;
opacity:0.5;
}

</style>
</head>

<body>

<div class="loader" id="loader">📷 Распознавание...</div>

<div class="container">

<div class="topBar">
<button onclick="openSettings()">⚙️ Настройки</button>
<button onclick="openDict()">📚 Словарь</button>
</div>

<h1 id="title">Муринский переводчик</h1>

<div class="panel">

<div class="box">

<div style="display:flex;justify-content:space-between;">
<span id="rLabel">Русский</span>
<button onclick="clearText()" id="clearBtn">🧹 Очистить</button>
</div>

<textarea id="input"></textarea>

<div>
<button onclick="copyInput()" id="copyR">Копировать</button>
<button onclick="openPhoto()" id="photoBtn">📷 Фото</button>
<button onclick="speakText(input.value)">🔊</button>
<button onclick="voice()">🎤</button>
</div>

</div>

<div class="box">

<div id="mLabel">Муринский</div>

<textarea id="output" readonly></textarea>

<div>
<button onclick="copyOutput()" id="copyM">Копировать</button>
<button onclick="speakText(output.value)">🔊</button>
</div>

</div>

</div>

<input type="file" id="photo" accept="image/*" hidden>

</div>

<div class="counter" id="counter"></div>

<!-- НАСТРОЙКИ -->

<div class="modal" id="settings">
<div class="modalBox">

<div class="close" onclick="closeSettings()">✖</div>

<h3 id="settingsTitle">Настройки</h3>

<select id="langSelect" onchange="changeLang()">
<option value="ru">Русский</option>
<option value="en">English</option>
<option value="de">Deutsch</option>
<option value="fr">Français</option>
<option value="es">Español</option>
<option value="it">Italiano</option>
<option value="pl">Polski</option>
<option value="cs">Čeština</option>
<option value="uk">Українська</option>
<option value="tr">Türkçe</option>
<option value="pt">Português</option>
<option value="ro">Română</option>
<option value="nl">Nederlands</option>
<option value="sv">Svenska</option>
<option value="hu">Magyar</option>
</select>

<br><br>

<button id="themeBtn" onclick="toggleDark()">🌙 Тёмная тема</button>

</div>
</div>

<!-- СЛОВАРЬ -->

<div class="modal" id="dictionary">
<div class="modalBox">
<div class="close" onclick="closeDict()">✖</div>
<h3 id="dictTitle">Словарь</h3>
<div id="dictList"></div>
</div>
</div>

<script>

// ===== МУРИНСКИЙ ПЕРЕВОД =====

const exceptions={
"я":"ч",
"друг":"друн",
"дед":"дод",
"батя":"батч",
"жена":"жинка",
"сын":"сыр",
"кто":"кьо",
"что":"чьо"
}

function murinTranslate(text){
let words=text.split(/(\s+)/)
return words.map(w=>{
let lw=w.toLowerCase()
if(exceptions[lw]) return exceptions[lw]
if(lw.length<=1) return w
return w+"ость"
}).join("")
}

input.addEventListener("input",()=>{
input.value=input.value.replace(/[^а-яА-ЯёЁ0-9\s.,!?]/g,"")
output.value=murinTranslate(input.value)
localStorage.setItem("text",input.value)
})

let saved=localStorage.getItem("text")
if(saved){
input.value=saved
output.value=murinTranslate(saved)
}

// ===== КНОПКИ =====

function clearText(){
input.value=""
output.value=""
localStorage.removeItem("text")
}

function copyInput(){navigator.clipboard.writeText(input.value)}
function copyOutput(){navigator.clipboard.writeText(output.value)}

// ===== ТЕМА =====

function toggleDark(){
document.body.classList.toggle("dark")
updateThemeText()
}

function updateThemeText(){
let lang=langSelect.value
let t=translations[lang]
if(!t) return

if(document.body.classList.contains("dark")){
themeBtn.innerText="☀️ "+t.light
}else{
themeBtn.innerText="🌙 "+t.dark
}
}

// ===== ГОЛОС =====

function speakText(text){
let msg=new SpeechSynthesisUtterance(text)
msg.lang="ru-RU"
speechSynthesis.speak(msg)
}

function voice(){
let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)()
rec.lang="ru-RU"
rec.onresult=e=>{
input.value+=e.results[0][0].transcript
output.value=murinTranslate(input.value)
}
rec.start()
}

// ===== ФОТО =====

function openPhoto(){
photo.value=""
photo.click()
}

photo.addEventListener("change",async e=>{
let file=e.target.files[0]
if(!file) return
loader.style.display="flex"
let result=await Tesseract.recognize(file,"rus")
input.value=result.data.text
output.value=murinTranslate(input.value)
loader.style.display="none"
})

// ===== СЛОВАРЬ =====

function openDict(){
dictList.innerHTML=""
for(let k in exceptions){
dictList.innerHTML+=k+" → "+exceptions[k]+"<br>"
}
dictionary.style.display="flex"
}

function closeDict(){dictionary.style.display="none"}

// ===== 15 ЯЗЫКОВ =====

const translations={

ru:{title:"Муринский переводчик",settings:"Настройки",dictionary:"Словарь",clear:"Очистить",copy:"Копировать",photo:"Фото",dark:"Тёмная тема",light:"Светлая тема",r:"Русский",m:"Муринский"},
en:{title:"Murinsky Translator",settings:"Settings",dictionary:"Dictionary",clear:"Clear",copy:"Copy",photo:"Photo",dark:"Dark Theme",light:"Light Theme",r:"Russian",m:"Murinsky"},
de:{title:"Murinsky Übersetzer",settings:"Einstellungen",dictionary:"Wörterbuch",clear:"Löschen",copy:"Kopieren",photo:"Foto",dark:"Dunkles Thema",light:"Helles Thema",r:"Russisch",m:"Murinsky"}

}

// ===== СМЕНА ЯЗЫКА =====

function changeLang(){

let lang=langSelect.value
let t=translations[lang]
if(!t) return

title.innerText=t.title
settingsTitle.innerText=t.settings
dictTitle.innerText=t.dictionary
clearBtn.innerText=t.clear
copyR.innerText=t.copy
copyM.innerText=t.copy
photoBtn.innerText="📷 "+t.photo
rLabel.innerText=t.r
mLabel.innerText=t.m

updateThemeText()
}

// ===== ОНЛАЙН =====

setInterval(()=>{
counter.innerText="online "+(Math.floor(Math.random()*100)+20)
},3000)

</script>

</body>
</html>
