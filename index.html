<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Муринский переводчик</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { darkMode: 'class' }
</script>

<script src="https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js"></script>

<style>
.loader {
  border: 4px solid #e5e7eb;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>

</head>

<body class="bg-white text-gray-800 dark:bg-gray-900 dark:text-white transition-colors duration-300">

<div class="max-w-4xl mx-auto p-6">

<h1 class="text-4xl font-bold text-center mb-8">
Муринский переводчик
</h1>

<div class="flex gap-3 flex-wrap mb-4">

<button onclick="toggleTheme()" class="px-4 py-2 rounded-2xl bg-gray-600 text-white">
🌙 Тёмная тема
</button>

<button onclick="clearText()" class="px-4 py-2 rounded-2xl bg-red-600 text-white">
🧹 Очистить
</button>

<button onclick="document.getElementById('photoInput').click()"
class="px-4 py-2 rounded-2xl bg-green-600 text-white">
📷 Фото
</button>

<button onclick="openDictionary()"
class="px-4 py-2 rounded-2xl bg-blue-600 text-white">
📚 Словарь
</button>

<input type="file" id="photoInput" accept="image/*" hidden>

</div>

<!-- LOADER -->
<div id="loader" class="hidden flex justify-center my-4">
<div class="loader"></div>
</div>

<div class="grid md:grid-cols-2 gap-4">

<div>
<p class="font-semibold mb-1">Русский</p>
<textarea id="input"
class="w-full h-40 p-3 rounded-2xl bg-gray-100 dark:bg-gray-700"></textarea>
</div>

<div>
<p class="font-semibold mb-1">Муринский</p>
<textarea id="output"
readonly
class="w-full h-40 p-3 rounded-2xl bg-gray-200 dark:bg-gray-600"></textarea>
</div>

</div>

</div>

<!-- СЛОВАРЬ -->
<div id="dictModal"
class="fixed inset-0 bg-black/50 hidden items-center justify-center">

<div class="bg-white dark:bg-gray-800 p-6 rounded-2xl max-w-md w-full">

<div class="flex justify-between items-center mb-4">
<h2 class="text-xl font-bold">Словарь</h2>
<button onclick="closeDictionary()">✖</button>
</div>

<div class="space-y-1 text-sm">
<div>друг → друн</div>
<div>я → ч</div>
<div>дед → дод</div>
<div>батя → батч</div>
<div>жена → жинка</div>
<div>сын → сыр</div>
<div>кто → кьо</div>
<div>что → чьо</div>
</div>

</div>
</div>

<script>

// ===== ИСКЛЮЧЕНИЯ =====
const dictionary = {
  друг: "друн",
  я: "ч",
  дед: "дод",
  батя: "батч",
  жена: "жинка",
  сын: "сыр",
  кто: "кьо",
  что: "чьо"
};

// ===== ПЕРЕВОД =====
function translate(text){
  return text.split(/(\s+)/).map(word=>{
    let lower = word.toLowerCase();

    if(dictionary[lower]){
      return dictionary[lower];
    }

    if(word.length <= 1) return word;

    return word + "ость";
  }).join("");
}

document.getElementById("input").addEventListener("input", e=>{
  let value = e.target.value;
  document.getElementById("output").value = translate(value);
  localStorage.setItem("murino_text", value);
});

// ===== АВТОЗАГРУЗКА =====
window.onload = ()=>{
  let saved = localStorage.getItem("murino_text");
  if(saved){
    document.getElementById("input").value = saved;
    document.getElementById("output").value = translate(saved);
  }
};

// ===== КОПИРОВАНИЕ =====
function copyText(id){
  navigator.clipboard.writeText(document.getElementById(id).value);
}

// ===== ТЁМНАЯ ТЕМА =====
function toggleTheme(){
  document.documentElement.classList.toggle("dark");
}

// ===== ОЧИСТКА =====
function clearText(){
  document.getElementById("input").value = "";
  document.getElementById("output").value = "";
  localStorage.removeItem("murino_text");
}

// ===== СЛОВАРЬ =====
function openDictionary(){
  document.getElementById("dictModal").classList.remove("hidden");
  document.getElementById("dictModal").classList.add("flex");
}

function closeDictionary(){
  document.getElementById("dictModal").classList.add("hidden");
}

// ===== ФОТО + ЗАГРУЗКА =====
document.getElementById("photoInput").addEventListener("change", async function(e){

  const file = e.target.files[0];
  if(!file) return;

  document.getElementById("loader").classList.remove("hidden");

  const worker = await Tesseract.createWorker("rus+eng");

  const { data:{ text } } = await worker.recognize(file);

  await worker.terminate();

  document.getElementById("loader").classList.add("hidden");

  document.getElementById("input").value = text;
  document.getElementById("output").value = translate(text);

});

</script>

</body>
</html>
