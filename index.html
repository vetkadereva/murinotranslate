<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Муринский переводчик</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f8f9fa;
margin:0;
padding:30px;
transition:0.3s;
}

.dark{
background:#202124;
color:white;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.topBar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.panel{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.box{
background:white;
border-radius:12px;
border:1px solid #dadce0;
padding:14px;
}

.dark .box{
background:#303134;
border-color:#5f6368;
}

textarea{
width:100%;
height:170px;
border:none;
resize:none;
font-size:16px;
outline:none;
background:transparent;
color:inherit;
}

button{
border:none;
background:#e8eaed;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin:4px;
}

.dark button{
background:#3c4043;
color:white;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modalBox{
background:white;
padding:20px;
border-radius:12px;
width:400px;
max-height:420px;
overflow:auto;
position:relative;
}

.dark .modalBox{
background:#303134;
}

.close{
position:absolute;
top:10px;
right:12px;
cursor:pointer;
font-size:18px;
}

.loader{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
z-index:1000;
}

.counter{
position:fixed;
bottom:8px;
right:10px;
font-size:11px;
opacity:0.5;
}

</style>
</head>

<body>

<div class="loader" id="loader">
📷 Распознавание текста...
</div>

<div class="container">

<div class="topBar">

<div>
<button onclick="openSettings()">⚙️ Настройки</button>
<button onclick="openDict()">📚 Словарь</button>
</div>

</div>

<h1 id="title">Муринский переводчик</h1>

<div class="panel">

<div class="box">

<div style="display:flex;justify-content:space-between;align-items:center;">
<span id="rLabel">Русский</span>
<button onclick="clearText()">🧹 Очистить</button>
</div>

<textarea id="input"></textarea>

<div>
<button onclick="copyInput()">Копировать</button>
<button onclick="openPhoto()">📷 Фото</button>
<button onclick="speakText(input.value)">🔊</button>
<button onclick="voice()">🎤</button>
</div>

</div>

<div class="box">

<div id="mLabel">Муринский</div>

<textarea id="output" readonly></textarea>

<div>
<button onclick="copyOutput()">Копировать</button>
<button onclick="speakText(output.value)">🔊</button>
</div>

</div>

</div>

<input type="file" id="photo" accept="image/*" hidden>

</div>

<div class="counter" id="counter"></div>

<!-- НАСТРОЙКИ -->

<div class="modal" id="settings">
<div class="modalBox">

<div class="close" onclick="closeSettings()">✖</div>

<h3>Настройки</h3>

<button id="themeBtn" onclick="toggleDark()">🌙 Тёмная тема</button>

</div>
</div>

<!-- СЛОВАРЬ -->

<div class="modal" id="dictionary">
<div class="modalBox">

<div class="close" onclick="closeDict()">✖</div>

<h3>Словарь</h3>
<div id="dictList"></div>

</div>
</div>

<script>

// ===== ИСКЛЮЧЕНИЯ =====

const exceptions={
"я":"ч",
"друг":"друн",
"дед":"дод",
"батя":"батч",
"жена":"жинка",
"сын":"сыр",
"кто":"кьо",
"что":"чьо"
}

// ===== МУРИНСКИЙ ПЕРЕВОД =====

function murinTranslate(text){

let words=text.split(/(\s+)/)

return words.map(w=>{

let lw=w.toLowerCase()

if(exceptions[lw]) return exceptions[lw]

if(lw.length<=1) return w

return w+"ость"

}).join("")

}

input.addEventListener("input",()=>{

// запрет иностранных букв
input.value=input.value.replace(/[^а-яА-ЯёЁ0-9\s.,!?]/g,"")

output.value=murinTranslate(input.value)

})

// ===== КОПИРОВАНИЕ =====

function copyInput(){
navigator.clipboard.writeText(input.value)
}

function copyOutput(){
navigator.clipboard.writeText(output.value)
}

// ===== ОЧИСТКА =====

function clearText(){
input.value=""
output.value=""
}

// ===== ТЁМНАЯ ТЕМА =====

function toggleDark(){
document.body.classList.toggle("dark")

if(document.body.classList.contains("dark")){
themeBtn.innerText="☀️ Светлая тема"
}else{
themeBtn.innerText="🌙 Тёмная тема"
}
}

// ===== ГОЛОС =====

function speakText(text){
let msg=new SpeechSynthesisUtterance(text)
msg.lang="ru-RU"
speechSynthesis.speak(msg)
}

// ===== ГОЛОСОВОЙ ВВОД =====

function voice(){

let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

rec.lang="ru-RU"

rec.onresult=e=>{
input.value+=e.results[0][0].transcript
output.value=murinTranslate(input.value)
}

rec.start()

}

// ===== ФОТО + ЗАГРУЗКА =====

function openPhoto(){
photo.value=""
photo.click()
}

photo.addEventListener("change",async e=>{

let file=e.target.files[0]
if(!file) return

loader.style.display="flex"

let result=await Tesseract.recognize(file,"rus")

input.value=result.data.text
output.value=murinTranslate(input.value)

loader.style.display="none"

})

// ===== СЛОВАРЬ =====

function openDict(){

dictList.innerHTML=""

for(let k in exceptions){
dictList.innerHTML+=k+" → "+exceptions[k]+"<br>"
}

dictionary.style.display="flex"

}

function closeDict(){
dictionary.style.display="none"
}

// ===== НАСТРОЙКИ =====

function openSettings(){
settings.style.display="flex"
}

function closeSettings(){
settings.style.display="none"
}

// ===== ОНЛАЙН =====

setInterval(()=>{
counter.innerText="online "+(Math.floor(Math.random()*100)+20)
},3000)

</script>

</body>
</html>
